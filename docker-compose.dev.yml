version: "3.8"

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:17-alpine
    container_name: postgres-dev
    # TODO: Completar configuración del contenedor
    # 1. Definir variables de entorno para POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
    # 2. Exponer puerto por defecto de PostgreSQL
    # 3. Configurar volumen para persistencia de datos
    # 4. Definir healthcheck para asegurar disponibilidad
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  # Redis para colas BullMQ
  redis:
    image: redis:7-alpine
    container_name: redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app-network

    # Backend (NestJS)
  backend:
    # TODO: Configurar servicio de backend para desarrollo
    # 1. Definir build context y Dockerfile
    # 2. IMPORTANTE: Usar 'target: builder' o development stage
    # 3. Montar volumen de código fuente para habilitar HOT-RELOAD
    # 4. Exponer puerto API (3000)
    # 5. Definir variables de entorno (DB Host, usuario, pass, JWT Secret)
    container_name: backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    working_dir: /usr/src/app
    command: sh -c "npm ci && npm run start:dev"
    env_file:
      - ./.env
      - ./backend/.env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: http://localhost:3001
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules
    depends_on:
      db:
        # TODO: Esperar a que la DB esté saludable (service_healthy)
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  # Frontend (Next.js)
  frontend:
    # TODO: Configurar servicio de frontend para desarrollo
    # 1. Definir build context
    # 2. Usar target de desarrollo
    # 3. Exponer puerto de desarrollo Next.js (3001)
    # 4. Montar volúmenes necesarios
    image: node:20-slim
    container_name: frontend-dev
    working_dir: /usr/src/app
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0 --port 3001"
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      backend:
        condition: service_started
    networks:
      - app-network
# TODO: Definir volúmenes nombrados para persistencia
# volumes: ...

# TODO: Definir redes (opcional en compose v2 pero recomendado para aislamiento)
# networks: ...
volumes:
  # Volúmenes nombrados para persistencia y node_modules
  postgres_dev_data:
  redis_dev_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  # Red de aplicación para aislar servicios
  app-network:
    driver: bridge
